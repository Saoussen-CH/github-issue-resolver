name: Resolve Issue with Managed Agent

on:
  issues:
    types: [labeled]

jobs:
  resolve:
    if: github.event.label.name == 'ai-resolve'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r resolver/requirements.txt

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Comment on issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: "Agent is working on this. A PR will appear here when the fix is ready."
            });

      - name: Update agent MCP config with current GitHub token
        env:
          GOOGLE_CLOUD_PROJECT: ${{ secrets.GCP_PROJECT_ID }}
          RESOLVER_AGENT_ID: ${{ secrets.RESOLVER_AGENT_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python setup/update_agent_token.py

      - name: Run resolver agent
        env:
          GOOGLE_CLOUD_PROJECT: ${{ secrets.GCP_PROJECT_ID }}
          RESOLVER_AGENT_ID: ${{ secrets.RESOLVER_AGENT_ID }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python resolver/resolve.py "${{ github.event.issue.html_url }}"
